workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.16.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Generate iOS config files
        script: |
          # Generates ios/Flutter/generated_plugin_pods.rb, Generated.xcconfig,
          # and the ios/Podfile. Must run BEFORE pod install.
          flutter build ios --config-only --no-codesign

      - name: Fix Podfile deployment target
        script: |
          # Remove duplicate post_install blocks and set the correct deployment target.
          ruby - <<'RUBY'
          podfile_path = 'ios/Podfile'
          content = File.read(podfile_path)

          # Remove ALL existing post_install blocks (handles single or multiple)
          content.gsub!(/^post_install\s+do\s+\|[^|]*\|.*?^end\n?/m, '')
          content.rstrip!

          # Append exactly one correct post_install block
          content += "\n\npost_install do |installer|\n" \
                     "  installer.pods_project.targets.each do |target|\n" \
                     "    flutter_additional_ios_build_settings(target)\n" \
                     "    target.build_configurations.each do |config|\n" \
                     "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'\n" \
                     "      config.build_settings['SWIFT_VERSION'] = '5.0'\n" \
                     "    end\n" \
                     "  end\n" \
                     "end\n"

          File.write(podfile_path, content)
          puts "Podfile fixed."
          RUBY

      - name: Run pod install
        script: cd ios && pod install

      - name: Patch signing config for unsigned build
        script: |
          # Flutter requires DEVELOPMENT_TEAM to be a non-empty string even with
          # --no-codesign. A placeholder value passes Flutter's validator without
          # needing real Apple Developer credentials. The --no-codesign flag tells
          # Flutter/Xcode to skip actual code signing entirely.
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Replace any DEVELOPMENT_TEAM value (including empty "") with a placeholder
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = PLACEHOLDER1;/g' "$PBXPROJ"

          # Clear code sign identity so Xcode does not search for a certificate
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"

          # Use Manual signing so Xcode does not auto-fill team/profile
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"

          echo "Signing config patched. Verifying..."
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN" "$PBXPROJ" | sort -u

      - name: Build iOS (unsigned)
        script: |
          # Flutter drives the full build pipeline (links Flutter engine, frameworks, etc.)
          # --no-codesign skips signing; placeholder DEVELOPMENT_TEAM satisfies the
          # non-empty team check without real credentials.
          # Output artifact: build/ios/iphoneos/Runner.app
          flutter build ios --debug --no-codesign --no-pub

    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
