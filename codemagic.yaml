workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.15.2
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter precache --ios
          flutter pub get

      - name: Fix Podfile post_install hooks
        script: |
          # Flutter's pub get on macOS generates ios/Flutter/generated_plugin_pods.rb
          # and a Podfile. We surgically fix any duplicate post_install blocks in the
          # generated Podfile rather than replacing it, so the require line is preserved.
          ruby - <<'RUBY'
          podfile_path = 'ios/Podfile'
          content = File.read(podfile_path)

          # Remove ALL existing post_install blocks
          content.gsub!(/^post_install\s+do\s+\|[^|]*\|.*?^end\n?/m, '')
          content.rstrip!

          # Append a single, correct post_install block
          content += "\n\npost_install do |installer|\n" \
                     "  installer.pods_project.targets.each do |target|\n" \
                     "    flutter_additional_ios_build_settings(target)\n" \
                     "    target.build_configurations.each do |config|\n" \
                     "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'\n" \
                     "    end\n" \
                     "  end\n" \
                     "end\n"

          File.write(podfile_path, content)
          puts "Podfile post_install hooks fixed successfully."
          RUBY

      - name: Run pod install
        script: cd ios && pod install

      - name: Build iOS
        script: flutter build ios --debug --no-codesign --no-pub

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
