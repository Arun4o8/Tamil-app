<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - XR Tamil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="app-container" style="justify-content: center; padding: 24px;">

        <div class="animate-fade-in">
            <h1 style="text-align: center; margin-bottom: 10px;">Welcome Back</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Sign in to continue your
                journey</p>

            <div class="glass-panel">
                <!-- Mode Toggle -->
                <div style="display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border);">
                    <div id="tab-login" onclick="toggleMode('login')"
                        style="flex: 1; padding: 10px; text-align: center; cursor: pointer; color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: 600;">
                        Log In</div>
                    <div id="tab-signup" onclick="toggleMode('signup')"
                        style="flex: 1; padding: 10px; text-align: center; cursor: pointer; color: var(--text-muted);">
                        Sign Up</div>
                </div>

                <div class="input-group">
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email
                        Address</label>
                    <input type="email" id="user" class="input-field" placeholder="Enter email">
                </div>
                <div class="input-group">
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" id="pass" class="input-field" placeholder="Enter password">
                </div>

                <p id="error-msg"
                    style="color: #ff5252; font-size: 0.9rem; margin-top: 10px; display: none; text-align: center;">
                    <i class="fas fa-exclamation-circle"></i> <span id="err-text">Invalid credentials</span>
                </p>
                <p id="success-msg"
                    style="color: #66bb6a; font-size: 0.9rem; margin-top: 10px; display: none; text-align: center;">
                    <i class="fas fa-check-circle"></i> Account created! Please log in.
                </p>

                <button id="action-btn" class="btn-primary" onclick="handleAuth()" style="margin-top: 15px;">
                    Log In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </div>

            <p
                style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-muted); display: none;">
                Don't have an account? <span style="color: var(--primary);">Sign Up</span>
            </p>
        </div>
    </div>

    <script src="js/app-logic.js"></script>
    <!-- Firebase SDK Integration -->
    <script type="module">
        // Import Firebase Functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAf_RQx8vc-ejThWx5U-W9F5xvQwKMRV6k",
            authDomain: "dancewebsite-a672c.firebaseapp.com",
            projectId: "dancewebsite-a672c",
            storageBucket: "dancewebsite-a672c.firebasestorage.app",
            messagingSenderId: "306223842216",
            appId: "1:306223842216:web:f7d47d407ffce1d735539d",
            measurementId: "G-3V06DPZS6P"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Expose functions to global scope for HTML buttons
        window.handleAuth = function () {
            var u = document.getElementById("user").value.trim();
            var p = document.getElementById("pass").value.trim();
            var err = document.getElementById("error-msg");
            var errText = document.getElementById("err-text");
            var success = document.getElementById("success-msg");
            var btn = document.getElementById("action-btn");

            if (!u || !p) {
                errText.innerText = "Please fill in all fields";
                err.style.display = "block";
                return;
            }

            // Admin backdoor check first
            if (u === "admin" && p === "1234") {
                window.location.href = "viewer.html";
                return;
            }

            // Auto-format email if it's just a username
            let email = u;
            if (!u.includes("@")) {
                email = u + "@dance.com";
                console.log("Formatting username as email:", email);
            }

            // Show loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            if (window.currentMode === 'signup') {
                createUserWithEmailAndPassword(auth, email, p)
                    .then((userCredential) => {
                        success.style.display = "block";
                        err.style.display = "none";
                        setTimeout(() => {
                            window.location.href = "viewer.html";
                        }, 1000);
                    })
                    .catch((error) => {
                        btn.disabled = false;
                        btn.innerHTML = 'Create Account';
                        let msg = "Error signing up";
                        if (error.code === 'auth/email-already-in-use') msg = "Username already exists";
                        if (error.code === 'auth/weak-password') msg = "Password is too weak (min 6 chars)";
                        if (error.code === 'auth/invalid-email') msg = "Please enter a valid email address";
                        errText.innerText = msg;
                        err.style.display = "block";
                    });
            } else {
                signInWithEmailAndPassword(auth, email, p)
                    .then((userCredential) => {
                        window.location.href = "viewer.html";
                    })
                    .catch((error) => {
                        btn.disabled = false;
                        btn.innerHTML = 'Log In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>';
                        let msg = "Invalid credentials";
                        if (error.code === 'auth/invalid-credential') msg = "Wrong username or password";
                        if (error.code === 'auth/invalid-email') msg = "Invalid email format";
                        if (error.code === 'auth/user-not-found') msg = "User not found";
                        errText.innerText = msg;
                        err.style.display = "block";
                    });
            }
        }

        // Global State for Mode
        window.currentMode = 'login';
        window.toggleMode = function (mode) {
            window.currentMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const btn = document.getElementById('action-btn');
            const title = document.querySelector('h1');

            // Clear messages
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';

            if (mode === 'login') {
                tabLogin.style.color = 'var(--primary)';
                tabLogin.style.borderBottom = '2px solid var(--primary)';
                tabSignup.style.color = 'var(--text-muted)';
                tabSignup.style.borderBottom = 'none';

                btn.innerHTML = 'Log In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>';
                title.innerText = "Welcome Back";
            } else {
                tabSignup.style.color = 'var(--primary)';
                tabSignup.style.borderBottom = '2px solid var(--primary)';
                tabLogin.style.color = 'var(--text-muted)';
                tabLogin.style.borderBottom = 'none';

                btn.innerHTML = 'Create Account';
                title.innerText = "Join Us";
            }
        }


        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                window.handleAuth();
            }
        });

        // Input Listeners
        document.getElementById("user").addEventListener("input", () => document.getElementById("error-msg").style.display = 'none');
        document.getElementById("pass").addEventListener("input", () => document.getElementById("error-msg").style.display = 'none');
    </script>
</body>

</html>
