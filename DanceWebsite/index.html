<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XR Tamil Culture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 12px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(233, 30, 99, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        .icon-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="app-container"
        style="background-image: url('cover.png'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px;">
        <div
            style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, #121212 40%, transparent 100%);">
        </div>

        <!-- Header with Search and Saved Icons -->
        <div
            style="position: absolute; top: 20px; right: 20px; z-index: 3; display: flex; gap: 15px; animation: fadeIn 0.6s ease-out forwards;">
            <button onclick="window.location.href='viewer.html#language'" class="icon-btn">
                <i class="fas fa-language" style="font-size: 1.2rem;"></i>
            </button>
            <button onclick="performSearch()" class="icon-btn">
                <i class="fas fa-search" style="font-size: 1.2rem;"></i>
            </button>
            <button onclick="window.location.href='viewer.html#saved'" class="icon-btn">
                <i class="fas fa-bookmark" style="font-size: 1.2rem;"></i>
            </button>
        </div>

        <div class="animate-fade-in" style="position: relative; z-index: 2; padding-bottom: 20px;">
            <h1 id="landing-title" style="font-size: 2.8rem; line-height: 1; margin-bottom: 15px; font-weight: 800;">
                Experience<br><span style="color: var(--primary);">Tamil Culture</span><br>in XR</h1>
            <p id="landing-desc"
                style="color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; line-height: 1.4;">Immerse
                yourself in the
                vibrant heritage of Tamil dance, art, and history through immersive XR technology.</p>
            <button id="landing-btn" class="btn-primary" onclick="window.location.href='login.html'"
                style="margin-bottom: 20px; padding: 16px; font-size: 1.1rem; font-weight: 700;">Get
                Started</button>
        </div>
    </div>
    <script src="js/translations.js"></script>
    <script src="js/app-logic.js"></script>
    <script>
        function performSearch() {
            // Redirect to explore page
            window.location.href = 'viewer.html#explore';
        }
    </script>
</body>

</html>
