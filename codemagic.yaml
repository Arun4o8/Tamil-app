workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.15.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Generate Flutter iOS config files
        script: |
          # This generates ios/Flutter/generated_plugin_pods.rb, Generated.xcconfig,
          # and other required files — it also auto-generates a Podfile (which we overwrite next).
          flutter build ios --config-only --no-pub 2>/dev/null || true

      - name: Restore clean Podfile
        script: |
          # Overwrite the auto-generated Podfile with our known-good version that has
          # exactly one post_install hook with the correct deployment target.
          cp ios/Podfile.clean ios/Podfile

      - name: Run pod install
        script: cd ios && pod install

      - name: Build iOS
        script: flutter build ios --debug --no-codesign --no-pub

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
