workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.15.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Restore clean Podfile
        script: |
          # Use our pre-crafted Podfile that already has a single, correct post_install hook.
          # This prevents Flutter's generated Podfile from causing duplicate post_install errors.
          cp ios/Podfile.clean ios/Podfile

      - name: Run pod install
        script: cd ios && pod install

      - name: Build iOS
        script: flutter build ios --debug --no-codesign --no-pub

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
