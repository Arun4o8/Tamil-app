workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.15.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build iOS
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
