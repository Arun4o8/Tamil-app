<!DOCTYPE html>
<html>

<head>
    <title>Sidebar Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: Arial;
        }

        .test-btn {
            padding: 15px 30px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <h1>Sidebar Test</h1>
    <button class="test-btn" onclick="toggleSidebar()">☰ Open Sidebar</button>

    <!-- Left Sidebar -->
    <div id="left-sidebar"
        style="position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: rgba(20, 20, 20, 0.98); z-index: 3000; transition: left 0.3s ease; box-shadow: 2px 0 20px rgba(0,0,0,0.5); border-right: 2px solid #ff5722; overflow-y: auto;">
        <div style="padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 style="color: #ff5722; margin: 0;">Menu</h3>
                <i class="fas fa-times" onclick="toggleSidebar()"
                    style="color: white; font-size: 1.5rem; cursor: pointer; padding: 10px;"></i>
            </div>

            <div onclick="toggleSidebarContent('language')"
                style="padding: 15px; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.1); margin-bottom: 10px;">
                <i class="fas fa-language" style="color: #ff9100;"></i>
                <span style="margin-left: 10px;">Language</span>
            </div>
            <div id="sidebar-language"
                style="display: none; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 15px;">
                <div
                    style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 6px; margin-bottom: 8px; cursor: pointer;">
                    🇬🇧 English</div>
                <div style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer;">🇮🇳
                    தமிழ்</div>
            </div>

            <div onclick="toggleSidebarContent('about')"
                style="padding: 15px; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.1); margin-bottom: 10px;">
                <i class="fas fa-info-circle" style="color: #ff5722;"></i>
                <span style="margin-left: 10px;">About</span>
            </div>
            <div id="sidebar-about"
                style="display: none; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 15px;">
                <p style="font-size: 0.9rem;">AR/XR Tamil Culture Platform</p>
            </div>
        </div>
    </div>

    <!-- Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2999; display: none;">
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('left-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.style.left === '0px';

            if (isOpen) {
                sidebar.style.left = '-300px';
                overlay.style.display = 'none';
            } else {
                sidebar.style.left = '0px';
                overlay.style.display = 'block';
            }
            console.log('Sidebar toggled. Is open:', !isOpen);
        }

        function toggleSidebarContent(section) {
            const contentDiv = document.getElementById('sidebar-' + section);

            if (contentDiv) {
                contentDiv.style.display = contentDiv.style.display === 'none' ? 'block' : 'none';
            }
            console.log('Content toggled for:', section);
        }
    </script>
</body>

</html>
