workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.16.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Generate iOS config files
        script: |
          # Generates Generated.xcconfig and generated_plugin_pods.rb.
          # Must run BEFORE pod install. config-only mode does not validate the team.
          flutter build ios --config-only --no-codesign

      - name: Fix Podfile deployment target
        script: |
          ruby - <<'RUBY'
          podfile_path = 'ios/Podfile'
          content = File.read(podfile_path)

          # Remove ALL existing post_install blocks (handles single or multiple)
          content.gsub!(/^post_install\s+do\s+\|[^|]*\|.*?^end\n?/m, '')
          content.rstrip!

          # Append exactly one correct post_install block
          content += "\n\npost_install do |installer|\n" \
                     "  installer.pods_project.targets.each do |target|\n" \
                     "    flutter_additional_ios_build_settings(target)\n" \
                     "    target.build_configurations.each do |config|\n" \
                     "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'\n" \
                     "      config.build_settings['SWIFT_VERSION'] = '5.0'\n" \
                     "    end\n" \
                     "  end\n" \
                     "end\n"

          File.write(podfile_path, content)
          puts "Podfile fixed."
          RUBY

      - name: Run pod install
        script: cd ios && pod install

      - name: Clear code signing from Xcode project
        script: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Wipe team ID and code sign identity — xcodebuild will be instructed via
          # build settings overrides as well, but clearing the pbxproj avoids any
          # automatic signing escalation from Xcode 16.
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          echo "--- Signing config after patch ---"
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN" "$PBXPROJ" | sort -u

      - name: Build iOS (unsigned)
        script: |
          # flutter build ios --no-codesign runs the Xcode build successfully but then
          # Flutter's post-build validator rejects the result because it requires a real
          # Apple Developer Team for device builds (no bypass exists at the Flutter level).
          #
          # xcodebuild has no such validator. -derivedDataPath places ALL output under
          # build/derived/ in a well-known structure so the artifact glob is reliable.
          # Flutter's xcode_backend.sh build phases still run inside xcodebuild, so the
          # Flutter engine, Dart code, and assets are properly embedded in the .app.
          cd ios && xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$PWD/../build/derived" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build

          echo "--- Locating built Runner.app ---"
          find "$PWD/../build/derived" -name "Runner.app" -type d 2>/dev/null \
            || echo "WARNING: Runner.app not found under build/derived"

    artifacts:
      # xcodebuild with -derivedDataPath always outputs to:
      # <derivedDataPath>/Build/Products/<Configuration>-<sdk>/<Product>.app
      - build/derived/Build/Products/Debug-iphoneos/*.app
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
