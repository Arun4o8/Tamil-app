workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.2
      cocoapods: 1.16.2
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Generate iOS config files
        script: |
          # Generates ios/Flutter/generated_plugin_pods.rb, Generated.xcconfig,
          # and the ios/Podfile. Must run BEFORE pod install.
          flutter build ios --config-only --no-codesign

      - name: Fix Podfile deployment target
        script: |
          # Remove duplicate post_install blocks and set the correct deployment target.
          ruby - <<'RUBY'
          podfile_path = 'ios/Podfile'
          content = File.read(podfile_path)

          # Remove ALL existing post_install blocks (handles single or multiple)
          content.gsub!(/^post_install\s+do\s+\|[^|]*\|.*?^end\n?/m, '')
          content.rstrip!

          # Append exactly one correct post_install block
          content += "\n\npost_install do |installer|\n" \
                     "  installer.pods_project.targets.each do |target|\n" \
                     "    flutter_additional_ios_build_settings(target)\n" \
                     "    target.build_configurations.each do |config|\n" \
                     "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'\n" \
                     "    end\n" \
                     "  end\n" \
                     "end\n"

          File.write(podfile_path, content)
          puts "Podfile fixed."
          RUBY

      - name: Run pod install
        script: cd ios && pod install

      - name: Clear code signing from Xcode project
        script: |
          # Flutter requires DEVELOPMENT_TEAM to be present (even empty) for --no-codesign
          # to work on device builds. Clear any team ID from the Xcode project.
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS (unsigned)
        script: |
          # Use xcodebuild directly to bypass Flutter's post-build DEVELOPMENT_TEAM
          # validation, which rejects builds even when --no-codesign is passed.
          # The Xcode build itself succeeds without signing; Flutter's wrapper does not.
          cd ios && xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT="$PWD/../build/ios" \
            build 2>&1 | grep -E '(error:|Build succeeded|FAILED|warning:.*error)'

    artifacts:
      - build/ios/Debug-iphoneos/*.app
    publishing:
      email:
        recipients:
          - okerj849@gmail.com
        notify:
          success: true
          failure: true
